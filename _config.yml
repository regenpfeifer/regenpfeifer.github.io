# ============================================
# SITE CONFIGURATION
# ============================================

# Theme
theme: jekyll-theme-minimal

# Sprache & Zeitzone
lang: de-DE
timezone: Europe/Berlin

# ============================================
# SEO & META
# ============================================

# Haupttitel
title: »Regenpfeifer«

# Beschreibung für SEO und Feeds
description: Philosophie & Theologie, Literatur, Naturkunde, Politik & Gesellschaft.

# Logo / Avatar
logo: /assets/img/regenpfeifer.jpg

# Autor (optional, gut für SEO)
author:
  name: Regenpfeifer
  # email: deine@email.de  # optional

# ============================================
# NAVIGATION & LINKS
# ============================================

# Eigene Links in der Sidebar
my_links:
  - title: Github
    url: https://regenpfeifer.github.io/github
    external: false
# - title: LINKTITLE
#   url: URL
#   external: true

# ============================================
# FEATURES
# ============================================

# GitHub Downloads ausblenden
show_downloads: false

# Datenschutz-Seite vorhanden? (für Footer-Link)
datenschutz: false  # auf true setzen, wenn du /datenschutz.md erstellst

# Social Media Profile (für jekyll-seo-tag)
social:
  name: "Rechenheft"
  links:
    - https://social.regenpfeifer.net/@charadrius
    - https://social.regenpfeifer.net/@bavarianbirds
    - https://social.regenpfeifer.net/@linkskatholisch

# ============================================
# PLUGINS
# ============================================

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap  # Erstellt automatisch sitemap.xml

# ============================================
# WEBMASTER TOOLS (Sitemap etc.)
# ============================================

# Auskommentiert lassen, wenn nicht benötigt
# webmaster_verifications:
google-site-verification: JujF0Qkw4SWP6YljEomN4RV3vBjUif3FMGm3bJi8uf8

url: "https://regenpfeifer.github.io"
baseurl: ""

sitemap:
  exclude:
    - "/assets/fonts/fonts.html"
    - "/google5cbda2d5ab16cfaa.html"

# ============================================
# BUILD SETTINGS
# ============================================

# Markdown-Engine (Standard)
markdown: kramdown

# Ausgeschlossene Dateien beim Build
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Permalink-Struktur (für eventuelle Blog-Posts)
# permalink: /:categories/:year/:month/:day/:title/
