---
layout: null
permalink: /
image: "/assets/img/regenpfeifer.jpg"
---
<!DOCTYPE html>
<html lang="{{ site.lang | default: "de" }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    {% seo %}

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ "/assets/css/linktree.css?v=" | append: site.github.build_revision | relative_url }}">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ '/assets/img/favicon/favicon-96x96.png' | relative_url }}" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon/favicon.svg' | relative_url }}" />
	<link rel="shortcut icon" href="{{ '/assets/img/favicon/favicon.ico' | relative_url }}" />
	<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicon/apple-touch-icon.png' | relative_url }}" />
	<meta name="apple-mobile-web-app-title" content="Regenpfeifer" />
	<link rel="manifest" href="{{ '/assets/img/favicon/site.webmanifest' | relative_url }}" />
    <!-- Verifizierung -->
    <link rel="me" href="https://social.regenpfeifer.net/@charadrius">

    <style>
    .container h1 {
	   color: #A3BE8C;
	}
	</style>


</head>

<body>
    <div class="container">
        <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-pic">
        <h1>{{ site.title }}</h1>
        <p class="description">{{ site.description }}</p>

		<div class="links-container">
			{% for link in site.data.links %}
				<a href="{{ link.url }}"
				   class="link-card"
				   {% if link.url contains '.vcf' %} download {% else %} target="_blank" rel="noopener" {% endif %}
				   style="animation-delay: {{ forloop.index | times: 0.1 }}s; border-left: 4px solid {{ link.color | default: 'var(--accent-frost)' }};">

					{% if link.icon %}
						<img src="{{ link.icon | relative_url }}" alt="" class="link-icon">
					{% endif %}

					<span class="link-text">{{ link.name }}</span>
				</a>
			{% endfor %}
		</div>
		<!--
		<div class="qr-section">
			<p class="qr-text">Kontaktdaten speichern</p>
			<a href="https://regenpfeifer.github.io/assets/vcard/regenpfeifer.vcf">
				<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data={{ "/assets/vcard/regenpfeifer.vcf" | absolute_url }}"
					 alt="QR Code" class="qr-code">
			</a>
		</div>
		-->
        <footer>
            <a href="/github">Github</a>
            <span class="separator">·</span>
            <a href="/impressum">Impressum</a>
        </footer>
    </div>
</body>

</html>
