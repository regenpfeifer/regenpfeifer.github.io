<!DOCTYPE html>
<html lang="{{ site.lang | default: 'de' }}">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ "/assets/css/linktree.css?v=" | append: site.github.build_revision | relative_url }}">

    <link rel="icon" type="image/png" href="{{ '/assets/img/favicon/favicon-96x96.png' | relative_url }}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon/favicon.svg' | relative_url }}" />
    <link rel="shortcut icon" href="{{ '/assets/img/favicon/favicon.ico' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicon/apple-touch-icon.png' | relative_url }}" />
    <link rel="manifest" href="{{ '/assets/img/favicon/site.webmanifest' | relative_url }}" />

    <style>
        /* Spezifische Anpassungen für Inhaltsseiten (Markdown) */
        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: left; /* Fließtext linksbündig für bessere Lesbarkeit */
        }
        .content-body {
            line-height: 1.6;
            color: var(--text-primary);
        }
        .content-body h1, .content-body h2, .content-body h3 {
            color: var(--accent-frost);
            margin-top: 1.5em;
        }
        .content-body a {
            color: var(--accent-frost);
            text-decoration: underline;
        }
        .back-home {
            display: inline-block;
            margin-bottom: 30px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--text-secondary);
        }
        .back-home:hover {
            color: var(--accent-frost);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content-wrapper">

            <header>
                <a href="{{ "/" | relative_url }}" class="back-home">← Zurück zur Übersicht</a>
                {% if site.logo %}
                    <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-pic" style="width: 80px; height: 80px; margin-bottom: 20px;">
                {% endif %}
            </header>

            <main class="content-body" role="main">
                {{ content }}
            </main>

            <footer style="margin-top: 50px; border-top: 1px solid var(--bg-tertiary); padding-top: 20px;">
                <nav>
                    <a href="{{ "/" | relative_url }}">Home</a>
                    <span class="separator">·</span>
                    <a href="{{ "/impressum" | relative_url }}">Impressum</a>
                    {% if site.github.repository_url %}
                        <span class="separator">·</span>
                        <a href="{{ site.github.repository_url }}">GitHub</a>
                    {% endif %}
                </nav>
            </footer>

        </div>
    </div>

    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
</body>
</html>
