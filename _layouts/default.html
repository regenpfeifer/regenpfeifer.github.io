<!DOCTYPE html>
<html lang="{{ site.lang | default: 'de' }}">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ "/assets/css/linktree.css?v=" | append: site.github.build_revision | relative_url }}">

    <link rel="icon" type="image/png" href="{{ '/assets/img/favicon/favicon-96x96.png' | relative_url }}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon/favicon.svg' | relative_url }}" />
    <link rel="shortcut icon" href="{{ '/assets/img/favicon/favicon.ico' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicon/apple-touch-icon.png' | relative_url }}" />
    <link rel="manifest" href="{{ '/assets/img/favicon/site.webmanifest' | relative_url }}" />

    <style>
        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header & Navigation zentrieren */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .back-home {
            display: block; /* Block für einfache Zentrierung */
            margin-bottom: 20px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .back-home:hover {
            color: var(--accent-frost);
        }

        .global-title {
            font-family: 'Literata', serif;
            font-size: 1.8rem;
            margin: 15px 0 5px 0;
            color: var(--text-primary);
        }

        .global-title a {
            text-decoration: none;
            color: inherit;
        }

        /* Inhaltsbereich */
        .content-body {
            line-height: 1.7;
            color: var(--text-primary);
            text-align: left; /* Fließtext bleibt für Lesbarkeit links */
        }

        .content-body h1 {
            border-bottom: 1px solid var(--bg-tertiary);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .content-body h1, .content-body h2, .content-body h3 {
            color: var(--accent-frost);
        }

        .content-body a {
            color: var(--accent-frost);
            text-decoration: underline;
        }

        /* Footer zentrieren */
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--bg-tertiary);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.9rem;
        }

        footer nav a {
            margin: 0 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content-wrapper">

            <header>
                <a href="{{ "/" | relative_url }}" class="back-home">← Zurück zur Übersicht</a>

                {% if site.logo %}
                    <a href="{{ "/" | relative_url }}">
                        <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-pic" style="width: 70px; height: 70px; margin: 0 auto;">
                    </a>
                {% endif %}

                <div class="global-title">
                    <a href="{{ "/" | relative_url }}">{{ site.title }}</a>
                </div>
            </header>

            <main class="content-body" role="main">
                {{ content }}
            </main>

            <footer>
                <nav>
                    <a href="{{ "/" | relative_url }}">Home</a>
                    <span class="separator">·</span>
                    <a href="{{ "/impressum" | relative_url }}">Impressum</a>
                    {% if site.github.repository_url %}
                        <span class="separator">·</span>
                        <a href="{{ site.github.repository_url }}">GitHub</a>
                    {% endif %}
                </nav>
            </footer>

        </div>
    </div>

    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
</body>
</html>
