---
layout: null
permalink: /links/
---

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | {{ site.title }}</title>

    <meta property="og:title" content="Linktree | {{ site.title }}">
	<meta property="og:description" content="Alle meine wichtigen Links auf einen Blick.">
	<meta property="og:image" content="URL_ZU_DEINEM_PROFILBILD">
	<meta name="twitter:card" content="summary_large_image">

	<style>
		:root {
			--bg-color: #0f172a; /* Dunkler, moderner Hintergrund */
			--text-color: #ffffff;
		}

		body {
			margin: 0;
			padding: 40px 20px;
			background-color: var(--bg-color);
			background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
			font-family: 'Inter', -apple-system, sans-serif;
			color: var(--text-color);
			display: flex;
			justify-content: center;
		}

		.wrapper {
			width: 100%;
			max-width: 450px;
			text-align: center;
		}

		/* Profilbild-Animation */
		.profile-pic {
			width: 96px;
			height: 96px;
			border-radius: 50%;
			border: 3px solid rgba(255, 255, 255, 0.2);
			margin-bottom: 16px;
			transition: transform 0.3s ease;
		}
		.profile-pic:hover { transform: rotate(5deg) scale(1.05); }

		/* Die Buttons */
		.link-btn {
			display: block;
			padding: 16px;
			margin-bottom: 16px;
			border-radius: 16px;
			text-decoration: none;
			color: white;
			font-weight: 600;
			background: rgba(255, 255, 255, 0.05); /* Glass-Look */
			border: 1px solid rgba(255, 255, 255, 0.1);
			backdrop-filter: blur(10px);
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

			/* Animation beim Laden */
			opacity: 0;
			transform: translateY(20px);
			animation: fadeInUp 0.5s forwards;
		}

		.link-btn:hover {
			background: rgba(255, 255, 255, 0.15);
			transform: translateY(-4px) scale(1.02);
			box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
			border-color: rgba(255, 255, 255, 0.4);
		}

		/* Keyframes für das "Einfliegen" der Buttons */
		@keyframes fadeInUp {
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>


</head>
<body>
	<div class="wrapper">
		<img src="/assets/img/dein-bild.jpg" alt="Profile" class="profile-pic">
		<h1>{{ site.title }}</h1>
		<p style="opacity: 0.7; margin-bottom: 30px;">Mein digitaler Garten 🌿</p>

		<div class="links">
			{% for link in site.data.links %}
				<a href="{{ link.url }}"
				   class="link-btn"
				   style="animation-delay: {{ forloop.index | times: 0.1 }}s; border-left: 4px solid {{ link.color | default: '#6366f1' }};">
					{{ link.name }}
				</a>
			{% endfor %}
		</div>
	</div>
</body>
</html>
