---
layout: null
permalink: /links/
---
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" type="image/png" href="/favicon.png?">

    <title>Links | {{ site.title }}</title>

    <style>
        /* 1. VARIABLEN (Direkt aus deiner style.scss übernommen) */
        :root {
            --bg-primary: #ECEFF4;
            --bg-secondary: #E5E9F0;
            --bg-tertiary: #D8DEE9;
            --text-primary: #2E3440;
            --text-secondary: #3B4252;
            --accent-frost: #5E81AC;
            --link-color: #5E81AC;
            --link-hover: #81A1C1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #2E3440;
                --bg-secondary: #3B4252;
                --bg-tertiary: #434C5E;
                --text-primary: #ECEFF4;
                --text-secondary: #E5E9F0;
                --accent-frost: #88C0D0;
                --link-color: #88C0D0;
                --link-hover: #8FBCBB;
            }
        }

        /* 2. BASE STYLES */
        body {
            font-family: 'Source Serif 4', Georgia, serif; /* Gleiche Font wie Hauptseite */
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            transition: background-color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--accent-frost);
            margin-bottom: 1rem;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* 3. BUTTONS (Nord-Style) */

        /* ANIMATION */
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
			/* Flexbox für Icon und Text nebeneinander */
			display: flex;
			align-items: center; /* Zentriert Icon und Text vertikal */
			background-color: var(--bg-secondary);
			color: var(--text-primary);
			text-decoration: none;
			padding: 16px;
			/* padding: 12px 16px; */     /* Etwas kompakteres Padding */
			border-radius: 8px;
			font-weight: 700;
			border: 1px solid var(--bg-tertiary);
			transition: all 0.2s ease;

			/* Animation-Startzustand */
			opacity: 0;
			transform: translateY(10px);
			animation: fadeIn 0.5s forwards;
        }

        .link-card:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-frost);
            transform: scale(1.02);
            color: var(--link-color);
        }

        .link-icon {
			/* Feste Größe für alle Icons */
			width: 24px;
			height: 24px;

			/* Verhindert Verzerrungen */
			object-fit: contain;

			/* Abstand zum Text */
			margin-right: 16px;

			/* Optional: Stellt sicher, dass das Icon nicht schrumpft */
			flex-shrink: 0;

			object-fit: contain;    /* Verhindert Verzerrungen */
			/* Falls du SVGs nutzt, kannst du sie hier leicht filtern,
			um sie an das Nord-Design anzupassen, falls nötig */
			filter: brightness(0) saturate(100%) invert(20%) sepia(10%) saturate(1000%) hue-rotate(180deg);
		}

		.link-text {
			flex-grow: 1;           /* Der Text nimmt den restlichen Platz ein */
			text-align: left;       /* Text linksbündig für besseren Lesefluss */
		}


        /* 4. FOOTER */
        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 8px;
        }

        footer a:hover {
            text-decoration: underline;
        }

   }
    </style>

</head>
<body>

    <div class="container">
        <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-pic">
        <h1>{{ site.title }}</h1>
        <p class="description">{{ site.description }}</p>

		<div class="links-container">
			{% for link in site.data.links %}
				<a href="{{ link.url }}"
				   class="link-card"
				   style="animation-delay: {{ forloop.index | times: 0.1 }}s; border-left: 4px solid {{ link.color | default: 'var(--accent-frost)' }};">

					{% if link.icon %}
						<img src="{{ link.icon | relative_url }}" alt="" class="link-icon">
					{% endif %}

					<span class="link-text">{{ link.name }}</span>
				</a>
			{% endfor %}
		</div>

        <footer>
            <a href="{{ '/' | relative_url }}">Haupseite</a>
            <span class="separator">·</span>
            <a href="/impressum">Impressum</a>
            <span class="separator">·</span>
            <a href="/datenschutz">Datenschutz</a>
        </footer>
    </div>

</body>
</html>
