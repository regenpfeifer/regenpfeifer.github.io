---
layout: null
permalink: /links/
---
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" type="image/png" href="/favicon.png?">

    <title>Links | {{ site.title }}</title>

	<style>
		@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@700&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,700;1,7..72,400;1,7..72,700&display=swap");

		/* 1. VARIABLEN */
		:root {
		  --bg-primary: #eceff4;
		  --bg-secondary: #e5e9f0;
		  --bg-tertiary: #d8dee9;
		  --text-primary: #2e3440;
		  --text-secondary: #3b4252;
		  --text-muted: #4c566a;
		  --accent-frost: #5e81ac;
		  --link-color: #5e81ac;
		  --link-hover: #81a1c1;
		}

		@media (prefers-color-scheme: dark) {
		  :root {
			--bg-primary: #2e3440;
			--bg-secondary: #3b4252;
			--bg-tertiary: #434c5e;
			--text-primary: #eceff4;
			--text-secondary: #e5e9f0;
			--text-muted: #d8dee9;
			--accent-frost: #88c0d0;
			--link-color: #88c0d0;
			--link-hover: #8fbcbb;
		  }
		}

		/* 2. BASE STYLES */
		body {
		  font-family: "Literata", serif; /* Hauptschriftart */
		  background-color: var(--bg-primary);
		  color: var(--text-primary);
		  margin: 0;
		  display: flex;
		  justify-content: center;
		  padding: 40px 20px;
		  transition: background-color 0.3s ease;
		}

		.container {
		  width: 100%;
		  max-width: 450px;
		  text-align: center;
		}

		/* Ergänzung für Logo und Beschreibung */
		.profile-pic {
			width: 100px;          /* Festgelegte Breite */
			height: 100px;         /* Festgelegte Höhe */
			border-radius: 50%;    /* Macht das Bild rund */
			object-fit: cover;     /* Sorgt dafür, dass das Bild nicht verzerrt wird */
			border: 3px solid var(--accent-frost); /* Der blaue Nord-Rahmen */
			margin-bottom: 1.5rem;
			margin-top: 1rem;
		}

		.description {
			font-family: 'Literata', serif;
			color: var(--text-secondary);
			font-size: 1rem;
			margin-bottom: 2.5rem;
			font-style: italic;    /* Passt gut zum Literata-Stil */
			line-height: 1.4;
		}

		h1 {
		  font-family: "Literata", serif;
		  font-weight: 700;
		  font-size: 1.6rem;
		  margin-bottom: 0.5rem;
		}

		/* 3. BUTTONS & TYPOGRAFIE */
		.links-container {
		  display: flex;
		  flex-direction: column;
		  gap: 12px;
		}

		.link-card {
		  display: flex;
		  align-items: center;
		  justify-content: center; /* Zentriert die Gruppe aus Icon + Text */
		  background-color: var(--bg-secondary);
		  color: var(--text-primary);
		  text-decoration: none;
		  padding: 16px;
		  border-radius: 8px;
		  border: 1px solid var(--bg-tertiary);
		  transition: all 0.2s ease;

		  opacity: 0;
		  transform: translateY(10px);
		  animation: fadeIn 0.5s forwards;
		}

		.link-text {
		  font-family: "IBM Plex Sans", sans-serif; /* Button-Schriftart */
		  text-transform: uppercase;
		  font-variant: small-caps;
		  letter-spacing: 0.1em;
		  font-weight: 700;
		  font-size: 0.95rem;
		}

		.link-icon {
		  width: 20px;
		  height: 20px;
		  margin-right: 12px;
		  flex-shrink: 0;
		  object-fit: contain;
		  /* Nord-Filter */
		  filter: invert(48%) sepia(18%) saturate(1185%) hue-rotate(177deg)
			brightness(93%) contrast(90%);
		}

		@media (prefers-color-scheme: dark) {
		  .link-icon {
			filter: invert(76%) sepia(13%) saturate(913%) hue-rotate(149deg)
			  brightness(92%) contrast(88%);
		  }
		}

		.link-card:hover {
		  background-color: var(--bg-tertiary);
		  border-color: var(--accent-frost);
		  transform: scale(1.02);
		}

		/* ANIMATION & FOOTER */
		@keyframes fadeIn {
		  to {
			opacity: 1;
			transform: translateY(0);
		  }
		}

		footer {
		  margin-top: 3rem;
		  font-size: 0.85rem;
		  color: var(--text-muted);
		}
		footer a {
		  color: var(--text-secondary);
		  text-decoration: none;
		  margin: 0 8px;
		}
	</style>
</head>

<body>

    <div class="container">
        <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-pic">
        <h1>{{ site.title }}</h1>
        <p class="description">{{ site.description }}</p>

		<div class="links-container">
			{% for link in site.data.links %}
				<a href="{{ link.url }}"
				   class="link-card"
				   style="animation-delay: {{ forloop.index | times: 0.1 }}s; border-left: 4px solid {{ link.color | default: 'var(--accent-frost)' }};">

					{% if link.icon %}
						<img src="{{ link.icon | relative_url }}" alt="" class="link-icon">
					{% endif %}

					<span class="link-text">{{ link.name }}</span>
				</a>
			{% endfor %}
		</div>

        <footer>
            <a href="{{ '/' | relative_url }}">Haupseite</a>
            <span class="separator">·</span>
            <a href="/impressum">Impressum</a>
            <span class="separator">·</span>
            <a href="/datenschutz">Datenschutz</a>
        </footer>
    </div>

</body>
</html>
